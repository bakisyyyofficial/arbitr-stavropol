<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Арбитражный управляющий | Ставрополь</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }
        h1 { color: #2c3e50; margin-bottom: 10px; font-size: 24px; }
        p { color: #7f8c8d; line-height: 1.6; }
        .location { font-weight: bold; color: #3498db; margin-bottom: 20px; }
        .status {
            display: inline-block;
            background: #e1f5fe;
            color: #01579b;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .links a {
            display: block;
            text-decoration: none;
            background: #2c3e50;
            color: white;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            transition: 0.3s;
        }
        .links a.soon { background: #bdc3c7; cursor: not-allowed; }
        .links a:hover:not(.soon) { background: #34495e; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <div class="status">Сайт в разработке</div>
    <h1>Арбитражный управляющий</h1>
    <p class="location">г. Ставрополь</p>
    
    <p>Профессиональное сопровождение процедур банкротства физических и юридических лиц в Ставропольском крае.</p>

    <div class="links">
        <a href="#" class="soon">Telegram (скоро)</a>
        <a href="#" class="soon">WhatsApp (скоро)</a>
        <a href="mailto:your-email@mail.ru">Написать на почту</a>
    </div>
    
    <p style="font-size: 12px; margin-top: 30px; color: #bdc3c7;">
        © 2026 Арбитражный управляющий. Ставрополь.
    </p>
</div>

</body>
</html>
